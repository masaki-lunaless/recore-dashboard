<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECORE Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f0; color: #111; font-size: 14px; }
header { background: #111; color: #fff; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.08em; }
#status { font-size: 12px; color: #666; }
#status.ok { color: #4caf50; }
#status.err { color: #f44336; }
.bar { background: #fff; border-bottom: 1px solid #e8e8e4; padding: 12px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.bar label { font-size: 12px; color: #666; }
.bar input[type=password], .bar input[type=date] { padding: 7px 11px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.bar input[type=password] { width: 320px; font-family: monospace; }
.bar button { padding: 7px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer; background: #f4f4f0; }
.bar button:hover { background: #e8e8e4; }
.bar button.primary { background: #111; color: #fff; border-color: #111; }
.bar button.active { background: #111; color: #fff; border-color: #111; }
.bar button.export { background: #1976d2; color: #fff; border-color: #1976d2; }
.bar button.export:hover { background: #1565c0; }
.bar button.export:disabled { background: #aaa; border-color: #aaa; cursor: not-allowed; }
main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
#log { font-family: monospace; font-size: 12px; background: #fff; border: 1px solid #e8e8e4; border-radius: 8px; padding: 12px; max-height: 100px; overflow-y: auto; margin-bottom: 20px; line-height: 1.9; color: #666; }
#log .ok { color: #4caf50; }
#log .err { color: #f44336; }
#log .info { color: #1976d2; }
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
@media(max-width:700px){ .kpis { grid-template-columns: repeat(2,1fr); } }
.kpi { background: #fff; border: 1px solid #e8e8e4; border-radius: 8px; padding: 16px; }
.kpi .lbl { font-size: 11px; color: #999; margin-bottom: 6px; }
.kpi .val { font-size: 22px; font-weight: 500; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:900px){ .charts { grid-template-columns: 1fr; } }
.card { background: #fff; border: 1px solid #e8e8e4; border-radius: 8px; padding: 18px; }
.card h3 { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
.tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.tabs button { padding: 4px 10px; border: 1px solid #ddd; border-radius: 20px; font-size: 11px; cursor: pointer; background: #f4f4f0; }
.tabs button.active { background: #111; color: #fff; border-color: #111; }
.brow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.brow .nm { font-size: 12px; color: #444; width: 110px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.brow .track { flex: 1; background: #f0f0ec; border-radius: 3px; height: 7px; }
.brow .fill { height: 7px; border-radius: 3px; background: #111; }
.brow .cnt { font-size: 12px; color: #888; width: 70px; text-align: right; flex-shrink: 0; }
.empty { text-align: center; padding: 32px; color: #ccc; font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>RECORE DASHBOARD</h1>
  <span id="status">未接続</span>
</header>

<div class="bar">
  <label>API KEY</label>
  <input type="password" id="apikey" placeholder="APIキーを入力" />
  <button class="primary" onclick="connect()">接続</button>
  <span style="color:#ddd">|</span>
  <label>期間</label>
  <input type="date" id="from" />
  <span style="color:#999">〜</span>
  <input type="date" id="to" />
  <button onclick="setDays(7,this)">7日</button>
  <button class="active" id="d30" onclick="setDays(30,this)">30日</button>
  <button onclick="setDays(90,this)">90日</button>
  <button class="primary" onclick="load()">取得</button>
  <span style="color:#ddd">|</span>
  <button class="export" id="btn-export" onclick="exportCSV()" disabled>CSVエクスポート</button>
</div>

<main>
  <div id="log">APIキーを入力して接続してください。</div>

  <div class="kpis">
    <div class="kpi"><div class="lbl">売上件数</div><div class="val" id="v-count">—</div></div>
    <div class="kpi"><div class="lbl">売上金額（税込）</div><div class="val" id="v-rev">—</div></div>
    <div class="kpi"><div class="lbl">平均単価</div><div class="val" id="v-avg">—</div></div>
    <div class="kpi"><div class="lbl">ユニーク会員</div><div class="val" id="v-mem">—</div></div>
  </div>

  <div class="charts">
    <div class="card">
      <h3>カテゴリ別</h3>
      <div class="tabs">
        <button class="active" onclick="sw('cat','count',this)">件数</button>
        <button onclick="sw('cat','rev',this)">金額</button>
      </div>
      <div id="c-cat"><div class="empty">データなし</div></div>
    </div>
    <div class="card">
      <h3>ブランド別</h3>
      <div class="tabs">
        <button class="active" onclick="sw('brand','count',this)">件数</button>
        <button onclick="sw('brand','rev',this)">金額</button>
      </div>
      <div id="c-brand"><div class="empty">データなし</div></div>
    </div>
    <div class="card">
      <h3>マケプレ別</h3>
      <div class="tabs">
        <button class="active" onclick="sw('mkt','count',this)">件数</button>
        <button onclick="sw('mkt','rev',this)">金額</button>
      </div>
      <div id="c-mkt"><div class="empty">データなし</div></div>
    </div>
    <div class="card">
      <h3>週次トレンド</h3>
      <div id="c-trend"><div class="empty">データなし</div></div>
    </div>
  </div>
</main>

<script>
const API = 'https://co-api.recore-pos.com';
let KEY = '';
let data = { cat:{count:{},rev:{}}, brand:{count:{},rev:{}}, mkt:{count:{},rev:{}} };
let exportRows = []; // CSVエクスポート用の生データ

function addLog(msg, type) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP');
  el.innerHTML += '<span class="' + type + '">[' + t + '] ' + msg + '\n</span>';
  el.scrollTop = el.scrollHeight;
}

function toDateTimeStr(dateStr, endOfDay) {
  return dateStr + (endOfDay ? ' 23:59:59' : ' 00:00:00');
}

function setDays(n, btn) {
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - n);
  document.getElementById('to').value = to.toISOString().slice(0,10);
  document.getElementById('from').value = from.toISOString().slice(0,10);
  document.querySelectorAll('.bar button:not(.primary):not(.export)').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

async function req(path, params) {
  const url = new URL(API + path);
  if (params) {
    Object.keys(params).forEach(function(k){ url.searchParams.set(k, params[k]); });
  }
  const r = await fetch(url.toString(), {
    method: 'GET',
    headers: { 'Authorization': KEY }
  });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function connect() {
  KEY = document.getElementById('apikey').value.trim();
  if (!KEY) { addLog('APIキーを入力してください', 'err'); return; }
  addLog('接続テスト中...', 'info');
  try {
    await req('/me');
    document.getElementById('status').textContent = '接続済み';
    document.getElementById('status').className = 'ok';
    addLog('接続成功！', 'ok');
    load();
  } catch(e) {
    addLog('接続失敗: ' + e.message, 'err');
    document.getElementById('status').textContent = 'エラー';
    document.getElementById('status').className = 'err';
  }
}

async function load() {
  if (!KEY) { addLog('先に接続してください', 'err'); return; }
  const from = document.getElementById('from').value;
  const to = document.getElementById('to').value;
  addLog('データ取得開始... (' + from + ' 〜 ' + to + ')', 'info');
  document.getElementById('btn-export').disabled = true;

  try {
    let cases = [];
    let cursor = '';
    while (true) {
      const params = { limit: 100, cursor: cursor };
      if (from) params.done_at_from = toDateTimeStr(from, false);
      if (to) params.done_at_to = toDateTimeStr(to, true);
      const res = await req('/v2/sas_cases', params);
      const rows = Array.isArray(res) ? res : (res.data || []);
      cases = cases.concat(rows);
      addLog(cases.length + '件取得中...', 'info');
      if (rows.length < 100) break;
      cursor = rows[rows.length - 1].id || '';
      if (!cursor) break;
    }
    addLog('合計 ' + cases.length + '件取得完了', 'ok');
    await buildData(cases);
  } catch(e) {
    addLog('取得エラー: ' + e.message, 'err');
  }
}

async function buildData(cases) {
  addLog('商品・会員情報を取得中...', 'info');

  const itemIdSet = {};
  const itemIds = [];
  cases.forEach(function(c) {
    if (c.goods) {
      c.goods.forEach(function(g) {
        if (g.item_id && !itemIdSet[g.item_id]) {
          itemIdSet[g.item_id] = true;
          itemIds.push(g.item_id);
        }
      });
    }
  });

  const memberIdSet = {};
  const memberIds = [];
  cases.forEach(function(c) {
    if (c.member_id && !memberIdSet[c.member_id]) {
      memberIdSet[c.member_id] = true;
      memberIds.push(c.member_id);
    }
  });

  const items = {}, products = {}, members = {};

  for (var i = 0; i < itemIds.length; i += 5) {
    await Promise.all(itemIds.slice(i, i+5).map(async function(id) {
      try {
        const item = await req('/items/' + id);
        items[id] = item;
        if (item.product_id && !products[item.product_id]) {
          const p = await req('/products/' + item.product_id);
          products[item.product_id] = p;
        }
      } catch(e) {}
    }));
  }

  for (var j = 0; j < memberIds.length; j += 5) {
    await Promise.all(memberIds.slice(j, j+5).map(async function(id) {
      try { members[id] = await req('/members/' + id); } catch(e) {}
    }));
  }

  addLog('エンリッチ完了、集計中...', 'info');

  let totalRev = 0;
  const memSet = new Set();
  const catC={}, catR={}, brandC={}, brandR={}, mktC={}, mktR={}, weekC={};
  data = { cat:{count:catC,rev:catR}, brand:{count:brandC,rev:brandR}, mkt:{count:mktC,rev:mktR} };
  exportRows = [];

  cases.forEach(function(c) {
    const price = Number((c.summary && c.summary.total) || 0);
    const subtotal = Number((c.summary && c.summary.sub_total) || 0);
    const tax = Number((c.summary && c.summary.total) || 0) - subtotal;
    totalRev += price;
    if (c.member_id) memSet.add(c.member_id);

    const mkt = normMkt(members[c.member_id]);
    mktC[mkt] = (mktC[mkt]||0) + 1;
    mktR[mkt] = (mktR[mkt]||0) + price;

    const doneAt = c.done_at ? fmtDate(new Date(c.done_at * 1000)) : '';

    if (c.goods) {
      c.goods.forEach(function(g) {
        const item = items[g.item_id] || {};
        const prod = products[item.product_id] || {};
        const cat = (prod.category && prod.category.name) || item.category_name || '未分類';
        const brand = (prod.attribute && prod.attribute.brand) || item.brand_name || '不明';
        const gPrice = Number(g.unit_price || 0) * Number(g.quantity || 1);
        catC[cat] = (catC[cat]||0) + 1;
        catR[cat] = (catR[cat]||0) + gPrice;
        brandC[brand] = (brandC[brand]||0) + 1;
        brandR[brand] = (brandR[brand]||0) + gPrice;

        // エクスポート用行データ（1商品1行）
        exportRows.push({
          date: doneAt,
          code: c.code || '',
          category: cat,
          brand: brand,
          marketplace: mkt,
          item_id: g.item_id || '',
          quantity: g.quantity || 1,
          unit_price: g.unit_price || 0,
          subtotal: subtotal,
          tax: tax,
          total: price
        });
      });
    }

    if (c.done_at) {
      const wk = weekKey(new Date(c.done_at * 1000));
      weekC[wk] = (weekC[wk]||0) + 1;
    }
  });

  document.getElementById('v-count').textContent = cases.length.toLocaleString();
  document.getElementById('v-rev').textContent = '¥' + totalRev.toLocaleString();
  document.getElementById('v-avg').textContent = cases.length ? '¥' + Math.round(totalRev/cases.length).toLocaleString() : '—';
  document.getElementById('v-mem').textContent = memSet.size.toLocaleString();

  bars('c-cat', catC);
  bars('c-brand', brandC);
  bars('c-mkt', mktC);
  trend('c-trend', weekC);

  document.getElementById('btn-export').disabled = false;
  addLog('完了！CSVエクスポートが可能になりました', 'ok');
}

function fmtDate(d) {
  return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate());
}

function pad(n) {
  return n < 10 ? '0' + n : '' + n;
}

function exportCSV() {
  if (!exportRows.length) { addLog('データがありません', 'err'); return; }

  const headers = ['日付', 'ケースコード', 'カテゴリ', 'ブランド', 'マケプレ', '在庫ID', '数量', '販売単価', '小計（税抜）', '消費税', '合計（税込）'];
  const rows = exportRows.map(function(r) {
    return [r.date, r.code, r.category, r.brand, r.marketplace, r.item_id, r.quantity, r.unit_price, r.subtotal, r.tax, r.total];
  });

  const csv = [headers].concat(rows).map(function(row) {
    return row.map(function(cell) {
      const s = String(cell);
      // カンマ・改行・ダブルクォートを含む場合はダブルクォートで囲む
      if (s.indexOf(',') >= 0 || s.indexOf('\n') >= 0 || s.indexOf('"') >= 0) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',');
  }).join('\n');

  // BOM付きUTF-8（Excelで文字化けしないように）
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const from = document.getElementById('from').value.replace(/-/g, '');
  const to = document.getElementById('to').value.replace(/-/g, '');
  a.href = url;
  a.download = 'recore_' + from + '_' + to + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  addLog('CSVをダウンロードしました', 'ok');
}

function normMkt(member) {
  const name = (member && (member.company_name || member.last_name)) || '';
  if (!name) return 'その他';
  const n = name.toLowerCase();
  if (n.indexOf('メルカリ') >= 0 || n.indexOf('mercari') >= 0) return 'メルカリ';
  if (n.indexOf('ヤフオク') >= 0 || n.indexOf('yahoo') >= 0) return 'ヤフオク';
  if (n.indexOf('楽天') >= 0 || n.indexOf('rakuten') >= 0) return '楽天市場';
  if (n.indexOf('amazon') >= 0 || n.indexOf('アマゾン') >= 0) return 'Amazon';
  if (n.indexOf('paypay') >= 0 || n.indexOf('ペイペイ') >= 0) return 'PayPayフリマ';
  if (n.indexOf('店頭') >= 0 || n.indexOf('店舗') >= 0) return '店頭';
  return name;
}

function weekKey(d) {
  const diff = d.getDate() - d.getDay() + (d.getDay()===0 ? -6 : 1);
  const m = new Date(d);
  m.setDate(diff);
  return m.toISOString().slice(0,10);
}

function bars(id, obj) {
  const el = document.getElementById(id);
  const sorted = Object.entries(obj).sort(function(a,b){ return b[1]-a[1]; }).slice(0,8);
  if (!sorted.length) { el.innerHTML = '<div class="empty">データなし</div>'; return; }
  const max = sorted[0][1];
  el.innerHTML = sorted.map(function(item) {
    const nm = item[0], v = item[1];
    const disp = v > 10000 ? '¥' + Math.round(v/1000) + 'k' : v.toLocaleString();
    return '<div class="brow"><span class="nm" title="' + nm + '">' + nm + '</span><div class="track"><div class="fill" style="width:' + Math.round(v/max*100) + '%"></div></div><span class="cnt">' + disp + '</span></div>';
  }).join('');
}

function trend(id, obj) {
  const el = document.getElementById(id);
  const pts = Object.entries(obj).sort(function(a,b){ return a[0] < b[0] ? -1 : 1; });
  if (!pts.length) { el.innerHTML = '<div class="empty">データなし</div>'; return; }
  const W=400, H=130, px=30, py=20;
  const max = Math.max.apply(null, pts.map(function(p){ return p[1]; }));
  const coords = pts.map(function(p, i) {
    return {
      x: Math.round(px + i*(W-px*2)/Math.max(pts.length-1,1)),
      y: Math.round(py + (1 - p[1]/max)*(H-py*2)),
      wk: p[0], v: p[1]
    };
  });
  const line = coords.map(function(p,i){ return (i?'L':'M') + p.x + ',' + p.y; }).join(' ');
  const area = line + ' L' + coords[coords.length-1].x + ',' + (H-py) + ' L' + coords[0].x + ',' + (H-py) + ' Z';
  const dots = coords.map(function(p){ return '<circle cx="' + p.x + '" cy="' + p.y + '" r="3" fill="#111"><title>' + p.wk + ': ' + p.v + '件</title></circle>'; }).join('');
  const step = Math.ceil(pts.length/5);
  const lbls = coords.filter(function(_,i){ return i % step === 0; }).map(function(p){ return '<text x="' + p.x + '" y="' + (H-4) + '" text-anchor="middle" font-size="9" fill="#bbb">' + p.wk.slice(5) + '</text>'; }).join('');
  el.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:130px;"><path d="' + area + '" fill="#111" fill-opacity="0.07"/><path d="' + line + '" fill="none" stroke="#111" stroke-width="1.5"/>' + dots + lbls + '</svg>';
}

function sw(group, type, btn) {
  btn.closest('.tabs').querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  const idMap = {cat:'c-cat', brand:'c-brand', mkt:'c-mkt'};
  bars(idMap[group], data[group][type]);
}

setDays(30, document.getElementById('d30'));
</script>
</body>
</html>
